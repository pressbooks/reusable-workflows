name: Crowdin Translations Sync

on:
  workflow_call:
    inputs:
      action:
        type: string
        description: "'upload' to push sources, 'download' to pull translations, 'seed' to upload sources + existing translations"
        required: true
      pot_file_path:
        type: string
        description: "Relative path to the POT file (e.g., languages/pressbooks-book.pot)"
        required: true
      languages_dir:
        type: string
        description: "Directory containing translation files"
        required: false
        default: "languages/"
      crowdin_branch_name:
        type: string
        description: "Branch name in Crowdin for repo isolation (e.g., repo name)"
        required: true
      base_branch:
        type: string
        description: "Git branch for checkout and PR base (e.g., dev)"
        required: true
      project_type:
        type: string
        description: "'open' for CROWDIN_OPEN_PROJECT_ID or 'private' for CROWDIN_PRIVATE_PROJECT_ID"
        required: false
        default: "open"

jobs:
  upload-sources:
    name: Upload Sources
    runs-on: ubuntu-latest
    if: inputs.action == 'upload'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.base_branch }}

      - name: Crowdin Upload Sources
        uses: crowdin/github-action@v2
        with:
          upload_sources: true
          upload_translations: false
          download_translations: false
          crowdin_branch_name: ${{ inputs.crowdin_branch_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ inputs.project_type == 'private' && secrets.CROWDIN_PRIVATE_PROJECT_ID || secrets.CROWDIN_OPEN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_API_SECRET }}

  seed-translations:
    name: Seed Translations
    runs-on: ubuntu-latest
    if: inputs.action == 'seed'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.base_branch }}

      - name: Crowdin Upload Sources & Translations
        uses: crowdin/github-action@v2
        with:
          upload_sources: true
          upload_translations: true
          download_translations: false
          crowdin_branch_name: ${{ inputs.crowdin_branch_name }}
          import_eq_suggestions: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ inputs.project_type == 'private' && secrets.CROWDIN_PRIVATE_PROJECT_ID || secrets.CROWDIN_OPEN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_API_SECRET }}

  download-translations:
    name: Pull Translations
    runs-on: ubuntu-latest
    if: inputs.action == 'download'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.base_branch }}

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: wp-cli/wp-cli-bundle

      - name: Crowdin Download
        uses: crowdin/github-action@v2
        with:
          upload_sources: false
          upload_translations: false
          download_translations: true
          crowdin_branch_name: ${{ inputs.crowdin_branch_name }}
          create_pull_request: true
          pull_request_title: "chore(l10n): update languages"
          pull_request_body: |
            ## Translations Update

            This PR contains the latest translation updates from Crowdin.

            ### Changes
            - Updated PO files from Crowdin
            - Compiled MO files automatically

            **Note:** This PR was automatically generated by the Crowdin GitHub Action.
          pull_request_labels: translations, automated
          pull_request_base_branch_name: ${{ inputs.base_branch }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ inputs.project_type == 'private' && secrets.CROWDIN_PRIVATE_PROJECT_ID || secrets.CROWDIN_OPEN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_API_SECRET }}

      - name: Generate .mo files from .po files
        if: success()
        run: wp i18n make-mo ${{ inputs.languages_dir }}

      - name: Commit MO files via API
        if: success()
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const langDir = '${{ inputs.languages_dir }}'.replace(/\/$/, '');

            // Find the PR created by Crowdin
            const { data: pulls } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:l10n_crowdin_action`
            });

            if (pulls.length === 0) {
              console.log('No Crowdin PR found, skipping MO commit');
              return;
            }

            const pr = pulls[0];
            console.log(`Found PR #${pr.number}`);

            const branch = pr.head.ref;

            // Get current commit SHA
            const { data: ref } = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${branch}`
            });

            // Get the tree
            const { data: commit } = await github.rest.git.getCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: ref.object.sha
            });

            // Create blobs for MO files
            const moFiles = fs.readdirSync(langDir).filter(f => f.endsWith('.mo'));

            if (moFiles.length === 0) {
              console.log('No MO files found, skipping commit');
              return;
            }

            const treeItems = [];

            for (const file of moFiles) {
              const content = fs.readFileSync(path.join(langDir, file), { encoding: 'base64' });
              const { data: blob } = await github.rest.git.createBlob({
                owner: context.repo.owner,
                repo: context.repo.repo,
                content: content,
                encoding: 'base64'
              });
              treeItems.push({
                path: `${langDir}/${file}`,
                mode: '100644',
                type: 'blob',
                sha: blob.sha
              });
            }

            // Create new tree
            const { data: newTree } = await github.rest.git.createTree({
              owner: context.repo.owner,
              repo: context.repo.repo,
              base_tree: commit.tree.sha,
              tree: treeItems
            });

            // Create commit
            const { data: newCommit } = await github.rest.git.createCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              message: 'chore(l10n): compile MO files',
              tree: newTree.sha,
              parents: [ref.object.sha]
            });

            // Update branch reference
            await github.rest.git.updateRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `heads/${branch}`,
              sha: newCommit.sha,
              force: false
            });

            console.log(`MO files committed successfully (${moFiles.length} files)`);
