name: Product Owner Dashboard

on:
  workflow_call:
    inputs:
      org_name:
        description: 'GitHub organization that owns the project'
        type: string
        required: true
      project_number:
        description: 'GitHub Project V2 number to monitor'
        type: number
        required: true
      project_statuses:
        description: 'Comma-separated list of project statuses to track (e.g., "Needs Review,New Issues")'
        type: string
        required: false
        default: 'Needs Review,New Issues'
      review_label:
        description: 'Label to search for across repos (e.g., needs-review)'
        type: string
        required: false
        default: 'needs-review'
      assignee_username:
        description: 'GitHub username to track assignments for'
        type: string
        required: true
      create_dashboard_issue:
        description: 'Create or update a dashboard tracking issue'
        type: boolean
        required: false
        default: true
      dry_run:
        description: 'Run in dry-run mode'
        type: boolean
        required: false
        default: false
    secrets:
      slack_webhook_url:
        description: 'Slack webhook URL for notifications'
        required: false
      gh_token:
        description: 'GitHub token with org project read access (PAT if repo is outside the org)'
        required: false

permissions:
  issues: write
  contents: read
  repository-projects: read

jobs:
  dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Generate Product Owner Dashboard
        id: dashboard
        uses: actions/github-script@v7
        env:
          INPUT_ORG_NAME: ${{ inputs.org_name }}
          INPUT_PROJECT_NUMBER: ${{ inputs.project_number }}
          INPUT_PROJECT_STATUSES: ${{ inputs.project_statuses }}
          INPUT_REVIEW_LABEL: ${{ inputs.review_label }}
          INPUT_ASSIGNEE: ${{ inputs.assignee_username }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        with:
          github-token: ${{ secrets.gh_token || secrets.GITHUB_TOKEN }}
          script: |
            const projectNumber = parseInt(process.env.INPUT_PROJECT_NUMBER);
            const statuses = process.env.INPUT_PROJECT_STATUSES.split(',').map(s => s.trim());
            const reviewLabel = process.env.INPUT_REVIEW_LABEL;
            const assignee = process.env.INPUT_ASSIGNEE;
            const dryRun = process.env.INPUT_DRY_RUN === 'true';
            const owner = process.env.INPUT_ORG_NAME;

            console.log('Project number: ' + projectNumber);
            console.log('Tracking statuses: ' + statuses.join(', '));
            console.log('Review label: ' + reviewLabel);
            console.log('Assignee: ' + assignee);

            // Query project items with status and content using GraphQL
            const projectItems = [];
            let hasNextPage = true;
            let cursor = null;

            while (hasNextPage) {
              const query = `
                query($org: String!, $number: Int!, $cursor: String) {
                  organization(login: $org) {
                    projectV2(number: $number) {
                      title
                      items(first: 100, after: $cursor) {
                        pageInfo {
                          hasNextPage
                          endCursor
                        }
                        nodes {
                          id
                          content {
                            ... on Issue {
                              number
                              title
                              url
                              state
                              createdAt
                              updatedAt
                              assignees(first: 10) {
                                nodes { login }
                              }
                              labels(first: 10) {
                                nodes { name }
                              }
                              repository {
                                name
                              }
                            }
                            ... on PullRequest {
                              number
                              title
                              url
                              state
                              createdAt
                              updatedAt
                              assignees(first: 10) {
                                nodes { login }
                              }
                              labels(first: 10) {
                                nodes { name }
                              }
                              repository {
                                name
                              }
                            }
                          }
                          status: fieldValueByName(name: "Status") {
                            ... on ProjectV2ItemFieldSingleSelectValue {
                              name
                            }
                          }
                        }
                      }
                    }
                  }
                }
              `;

              const result = await github.graphql(query, {
                org: owner,
                number: projectNumber,
                cursor: cursor
              });

              const project = result.organization.projectV2;
              const items = project.items;

              projectItems.push(...items.nodes);
              hasNextPage = items.pageInfo.hasNextPage;
              cursor = items.pageInfo.endCursor;
            }

            console.log('Total project items fetched: ' + projectItems.length);

            // Categorize items
            const dashboard = {
              byStatus: {},
              labeledItems: [],
              summary: {
                totalTracked: 0,
                byStatus: {},
                labeledCount: 0
              }
            };

            // Initialize status buckets
            statuses.forEach(s => {
              dashboard.byStatus[s] = [];
              dashboard.summary.byStatus[s] = 0;
            });

            const now = new Date();

            for (const item of projectItems) {
              if (!item.content || !item.content.number) continue;

              const statusName = item.status && item.status.name ? item.status.name : null;
              const content = item.content;
              const daysOpen = Math.floor((now - new Date(content.createdAt)) / (1000 * 60 * 60 * 24));
              const daysSinceUpdate = Math.floor((now - new Date(content.updatedAt)) / (1000 * 60 * 60 * 24));
              const labels = content.labels ? content.labels.nodes.map(l => l.name) : [];
              const assignees = content.assignees ? content.assignees.nodes.map(a => a.login) : [];
              const repo = content.repository ? content.repository.name : 'unknown';
              const isPR = content.url && content.url.includes('/pull/');

              const entry = {
                repo: repo,
                number: content.number,
                title: content.title,
                url: content.url,
                state: content.state,
                type: isPR ? 'PR' : 'Issue',
                status: statusName,
                days_open: daysOpen,
                days_since_update: daysSinceUpdate,
                labels: labels,
                assignees: assignees
              };

              // Match by project status
              if (statusName && statuses.includes(statusName)) {
                dashboard.byStatus[statusName].push(entry);
                dashboard.summary.byStatus[statusName]++;
                dashboard.summary.totalTracked++;
              }

              // Match by label
              if (labels.includes(reviewLabel)) {
                dashboard.labeledItems.push(entry);
                dashboard.summary.labeledCount++;
              }
            }

            // Generate report
            const reportLines = [];

            reportLines.push('# Product Owner Dashboard');
            reportLines.push('');
            reportLines.push('**Generated:** ' + now.toLocaleString());
            reportLines.push('**Project:** #' + projectNumber);
            reportLines.push('**Assignee:** @' + assignee);
            reportLines.push('');

            // Summary
            reportLines.push('## Summary');
            reportLines.push('');
            for (const [status, count] of Object.entries(dashboard.summary.byStatus)) {
              reportLines.push('- **' + status + ':** ' + count + ' items');
            }
            reportLines.push('- **Labeled `' + reviewLabel + '`:** ' + dashboard.summary.labeledCount + ' items');
            reportLines.push('');

            // Section per status
            for (const status of statuses) {
              const items = dashboard.byStatus[status];
              reportLines.push('## ' + status + ' (' + items.length + ')');
              reportLines.push('');

              if (items.length === 0) {
                reportLines.push('*No items*');
              } else {
                items.sort((a, b) => b.days_open - a.days_open);
                items.forEach(item => {
                  const type = item.type === 'PR' ? 'PR' : 'Issue';
                  reportLines.push('- **[' + item.repo + ']** #' + item.number + ' (' + type + '): ' + item.title);
                  reportLines.push('  - ' + item.url);
                  reportLines.push('  - Open for ' + item.days_open + ' days, last updated ' + item.days_since_update + ' days ago');
                  reportLines.push('  - Labels: ' + (item.labels.join(', ') || 'none'));
                  reportLines.push('  - Assignees: ' + (item.assignees.map(a => '@' + a).join(', ') || 'unassigned'));
                  reportLines.push('');
                });
              }
              reportLines.push('');
            }

            // Labeled items section (deduplicated from status sections)
            const labeledOnly = dashboard.labeledItems.filter(item => {
              return !statuses.includes(item.status);
            });

            if (labeledOnly.length > 0) {
              reportLines.push('## Labeled `' + reviewLabel + '` (not in tracked statuses) (' + labeledOnly.length + ')');
              reportLines.push('');
              labeledOnly.forEach(item => {
                reportLines.push('- **[' + item.repo + ']** #' + item.number + ': ' + item.title);
                reportLines.push('  - ' + item.url);
                reportLines.push('  - Status: ' + (item.status || 'none') + ' | Open for ' + item.days_open + ' days');
                reportLines.push('');
              });
            }

            const reportBody = reportLines.join('\n');

            // Totals for outputs
            const totalItems = dashboard.summary.totalTracked + labeledOnly.length;

            core.setOutput('report_body', reportBody);
            core.setOutput('total_items', totalItems);
            core.setOutput('dashboard_data', JSON.stringify(dashboard.summary));

            console.log('Dashboard generated: ' + totalItems + ' total items tracked');

      - name: Create Dashboard Issue
        if: inputs.create_dashboard_issue && steps.dashboard.outputs.total_items > 0 && !inputs.dry_run
        uses: actions/github-script@v7
        with:
          script: |
            const reportBody = `${{ steps.dashboard.outputs.report_body }}`;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator: 'github-actions[bot]',
              state: 'open',
              labels: 'po-dashboard'
            });

            const dashboardTitle = 'Product Owner Dashboard - ' + new Date().toISOString().split('T')[0];

            if (issues.data.length > 0) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                title: dashboardTitle,
                body: reportBody
              });
              console.log('Updated dashboard issue #' + issues.data[0].number);
            } else {
              const newIssue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: dashboardTitle,
                body: reportBody,
                labels: ['po-dashboard', 'automated']
              });
              console.log('Created dashboard issue #' + newIssue.data.number);
            }

      - name: Send Slack Notification
        if: steps.dashboard.outputs.total_items > 0 && env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "Product Owner Dashboard: ${{ steps.dashboard.outputs.total_items }} items to review",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "Product Owner Dashboard" }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*${{ steps.dashboard.outputs.total_items }}* items need attention in project #${{ inputs.project_number }}\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Full Report>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.slack_webhook_url }}
        continue-on-error: true

      - name: Workflow Summary
        if: always()
        run: |
          echo "### Product Owner Dashboard" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Project:** #${{ inputs.project_number }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Statuses Tracked:** ${{ inputs.project_statuses }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Review Label:** ${{ inputs.review_label }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Total Items:** ${{ steps.dashboard.outputs.total_items }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Dry Run:** ${{ inputs.dry_run }}" >> $GITHUB_STEP_SUMMARY
