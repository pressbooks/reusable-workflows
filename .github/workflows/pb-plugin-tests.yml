name: Run Tests 🧪

on:
  workflow_call:
    inputs:
      use_mariadb:
        description: "Use Maria DB"
        type: boolean
        required: false
        default: false
      requires_pressbooks:
        description: "Require Pressbooks"
        type: boolean
        required: false
        default: false
      requires_private_repo:
        description: "Require private repo"
        type: string
        required: false
        default: ""
      code_coverage:
        description: "Code coverage"
        type: boolean
        required: false
        default: true

jobs:
  tests:
    runs-on: ubuntu-24.04

    services:
      database:
        image: ${{ (inputs.use_mariadb) && 'mariadb:10.5' || 'mysql:8.0' }}
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=5s --health-timeout=5s --health-retries=3

    strategy:
      fail-fast: false
      matrix:
        include:
          - php: 8.3
            wordpress: 6.9.5
            experimental: false
          - php: 8.3
            wordpress: latest
            experimental: true
          - php: 8.4
            wordpress: 6.9.4
            experimental: true

    name: PHP ${{ matrix.php }} - WP ${{ matrix.wordpress }} - ${{ (inputs.use_mariadb) && 'MariaDB' || 'MySQL' }}
    continue-on-error: ${{ matrix.experimental == true }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Install OS dependencies
        run: |
          sudo apt update
          sudo apt-get install libxml2-utils ghostscript poppler-utils imagemagick subversion
          sudo apt-get install -y libavif16 libgif7

      - name: Setup PHP and extensions
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          coverage: pcov
          extensions: imagick

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: |
            ${{ steps.composer-cache.outputs.dir }}
            vendor
          key: ${{ runner.os }}-composer-${{ matrix.php }}-${{ hashFiles('**/composer.json', '**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-${{ matrix.php }}-
            ${{ runner.os }}-composer-

      - name: Cache WordPress test suite
        uses: actions/cache@v5
        with:
          path: /tmp/wordpress-tests-lib
          key: ${{ runner.os }}-wordpress-${{ matrix.wordpress }}-${{ hashFiles('bin/install-wp-tests.sh') }}

      - name: Install PHP dependencies
        env:
          GH_TOKEN: ${{ secrets.PAT_FOR_GITHUB_ACTIONS }}
        run: |
          if [ -n "$GH_TOKEN" ]; then
            export COMPOSER_AUTH="{\"github-oauth\": {\"github.com\": \"$GH_TOKEN\"}}"
          fi
          export PATH="$HOME/.composer/vendor/bin:$PATH"
          composer install --no-interaction --prefer-dist
          echo "REPO_NAME=$(basename $(pwd))" >> $GITHUB_ENV

      - name: Check Standards
        run: composer standards

      - name: Require Pressbooks
        if: inputs.requires_pressbooks == true
        run: |
          git clone --depth=1 --single-branch https://github.com/pressbooks/pressbooks.git ../pressbooks
          cd ../pressbooks && composer install --no-dev --prefer-dist
          cd ../$REPO_NAME

      - name: Require Private Repo
        if: inputs.requires_private_repo != ''
        env:
          GH_TOKEN: ${{ secrets.PAT_FOR_GITHUB_ACTIONS }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::PAT_FOR_GITHUB_ACTIONS secret is required to clone private repo '${{ inputs.requires_private_repo }}' but is not available (fork PRs do not have access to secrets)"
            exit 1
          fi
          git clone --depth=1 --single-branch https://x-access-token:${GH_TOKEN}@github.com/pressbooks/${{ inputs.requires_private_repo }}.git ../${{ inputs.requires_private_repo }}
          cd ../${{ inputs.requires_private_repo }} && composer install --no-dev --prefer-dist
          cd ../$REPO_NAME

      - name: Install WP tests
        run: bash bin/install-wp-tests.sh wordpress_test root root 127.0.0.1 ${{ matrix.wordpress }}

      - name: Link Pressbooks into plugins dir
        if: inputs.requires_pressbooks == true
        run: |
          # Symlink the full Pressbooks checkout (including committed assets/dist)
          # into WP_PLUGIN_DIR so boot-time hooks that read the Vite manifest
          # (e.g. register_duet_date_picker) don't fatal. A symlink preserves the
          # whole tree, unlike a selective copy which can drop build artifacts.
          WP_CORE_DIR="${WP_CORE_DIR:-/tmp/wordpress}"
          PLUGINS_DIR="${WP_CORE_DIR%/}/wp-content/plugins"
          PRESSBOOKS_SRC="$(cd ../pressbooks && pwd)"
          mkdir -p "$PLUGINS_DIR"
          rm -rf "$PLUGINS_DIR/pressbooks"
          ln -sfn "$PRESSBOOKS_SRC" "$PLUGINS_DIR/pressbooks"
          # Fail loud here if the built manifest didn't come across, instead of
          # as a wp_die() deep inside the test bootstrap.
          ls -la "$PLUGINS_DIR/pressbooks/assets/dist/manifest.json"

      - name: Run PHP Tests
        if: matrix.experimental == true
        env:
          X_PB_CI_TOKEN: ${{ secrets.X_PB_CI_TOKEN }}
        run: composer test

      - name: Run PHP Tests and PCOV
        if: matrix.experimental == false && inputs.code_coverage == true
        env:
          X_PB_CI_TOKEN: ${{ secrets.X_PB_CI_TOKEN }}
        run: composer test-coverage

      - name: Upload Coverage to Codecov
        if: matrix.experimental == false && inputs.code_coverage == true
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_SECRET }}
