name: Product Owner Dashboard

on:
  schedule:
    - cron: '0 9 * * 1'  # Weekly on Monday at 9 AM UTC
    - cron: '0 9 * * 4'  # Also run on Thursday at 9 AM UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run in dry-run mode'
        type: boolean
        default: true

jobs:
  dashboard:
    uses: pressbooks/gh-operations/.github/workflows/po-dashboard.yml@test
    with:
      # Monitor specific repos (change to 'all' for all org repos)
      target_repos: 'repo1,repo2,repo3'
      
      # Your GitHub username
      assignee_username: 'arzola'
      
      # Triage settings
      review_label: 'needs-review'
      lookback_days: 7
      
      # Dashboard settings
      include_prs: true
      max_items_per_repo: 20
      create_dashboard_issue: true
      
      dry_run: ${{ github.event.inputs.dry_run || false }}
    secrets:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    permissions:
      issues: write
      contents: read
