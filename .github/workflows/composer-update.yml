name: Composer Update 🎵

on:
  workflow_call:
    inputs:
      packages:
        type: string
        description: "List of space separated packages (ex: pressbooks/pressbooks pressbooks/pressbooks:1.0.1)"
  workflow_dispatch:
    inputs:
      packages:
        type: string
        description: "List of space separated packages (ex: pressbooks/pressbooks pressbooks/pressbooks:1.0.1)"

concurrency:
  group: composer-update-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.3
          tools: composer
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_FOR_GITHUB_ACTIONS }}
          PACKAGIST_TOKEN: ${{ secrets.PAT_COMPOSER_UPDATE }}
      - name: Get Composer Cache Directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          # The 'key' uses a hash of your lockfile. If the lockfile changes, the cache refreshes.
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-
      - name: Install PHP dependencies
        run: |
          export PATH="$HOME/.composer/vendor/bin:$PATH"
          composer config --auth http-basic.objectcache.pro token "${{ secrets.OBJECT_CACHE_PRO_TOKEN }}";
          composer install --no-interaction
      - name: Setup github config and create new branch
        run: |
          git config --global user.email "ops@pressbooks.com"
          git config --global user.name "pressbooks-ops"
          # -B resets the local branch to the current dev HEAD
          git checkout -B "${GITHUB_REF_NAME}-updated"
      - name: Inspect install paths
        run: |
          composer show pressbooks/pressbooks --path || true
          [ -d vendor/pressbooks/pressbooks/.git ] && echo "vendor path is a git repo"
          [ -d web/app/plugins/pressbooks/.git ] && echo "plugin path is a git repo"
      - name: Test COMPOSER_DISCARD_CHANGES in vendor and app/plugins
        run: |
          set -euo pipefail

          export COMPOSER_DISCARD_CHANGES=true

          VENDOR_FILE="vendor/pressbooks/pressbooks/README.md"
          PLUGIN_FILE="app/plugins/pressbooks/README.md"
          MARKER="LOCAL TEST CHANGE"

          if [ -f "$VENDOR_FILE" ]; then
            echo "$MARKER" >> "$VENDOR_FILE"
            echo "Modified $VENDOR_FILE"
          else
            echo "Vendor file not found: $VENDOR_FILE"
          fi

          if [ -f "$PLUGIN_FILE" ]; then
            echo "$MARKER" >> "$PLUGIN_FILE"
            echo "Modified $PLUGIN_FILE"
          else
            echo "Plugin file not found: $PLUGIN_FILE"
          fi

          composer update pressbooks/pressbooks --with-all-dependencies

          echo "Checking whether changes were discarded..."

          if [ -f "$VENDOR_FILE" ]; then
            if grep -q "$MARKER" "$VENDOR_FILE"; then
              echo "FAIL: change still present in $VENDOR_FILE"
              exit 1
            else
              echo "PASS: change removed from $VENDOR_FILE"
            fi
          fi

          if [ -f "$PLUGIN_FILE" ]; then
            if grep -q "$MARKER" "$PLUGIN_FILE"; then
              echo "FAIL: change still present in $PLUGIN_FILE"
              exit 1
            else
              echo "PASS: change removed from $PLUGIN_FILE"
            fi
          fi
